<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌸 Pink AI Chat 🌸</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span style="font-size: 1.8rem;">🌸</span>
                    <span>Pink AI Chat</span>
                </div>
                <button id="settingsBtn" class="settings-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </header>

        <main class="chat-container">
            <div id="chatMessages" class="chat-messages">
                <div class="welcome-message">
                    <div class="avatar bot-avatar">
                        <span style="font-size: 1.5rem;">💖</span>
                    </div>
                    <div class="message-content">
                        <div class="message-text">
                            🌸 嗨~ 欢迎来到 Pink AI Chat！<br>
                            ✨ 请先在设置中输入你的 API Key，然后就可以和我聊天啦~
                        </div>
                        <div class="message-info">🌸 Pink AI</div>
                    </div>
                </div>
            </div>

            <div id="typingIndicator" class="typing-indicator hidden">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </main>

        <div class="input-container">
            <div class="model-selector">
                <select id="modelSelect">
                    <option value="deepseek-v4-flash">DeepSeek V4 Flash</option>
                    <option value="deepseek-v4-pro">DeepSeek V4 Pro</option>
                    <option value="deepseek-chat">DeepSeek Chat (旧版)</option>
                    <option value="deepseek-reasoner">DeepSeek Reasoner (旧版)</option>
                </select>
            </div>
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="💬 输入你的问题，我会用心回答哦~" rows="1"></textarea>
                <button id="sendBtn" class="send-btn" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 2H11l-5 5v12l5-5h11a2 2 0 0 1 2 2v-4a2 2 0 0 0-2-2z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div id="settingsModal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3>API 设置</h3>
                    <button id="closeSettings" class="close-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="apiKey">DeepSeek API Key</label>
                        <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxx">
                        <div class="input-hint">在 <a href="https://platform.deepseek.com/api_keys" target="_blank">DeepSeek Platform</a> 获取 API Key</div>
                    </div>
                    <div class="form-group">
                        <label for="apiUrl">API Base URL</label>
                        <input type="text" id="apiUrl" value="https://api.deepseek.com/v1">
                        <div class="input-hint">默认使用官方 API 地址</div>
                    </div>
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="useProxy">
                            <span>使用 CORS 代理</span>
                        </label>
                        <div class="input-hint">如果直接访问 API 失败（CORS 错误），请启用代理并填写代理地址</div>
                    </div>
                    <div class="form-group">
                        <label for="proxyUrl">代理地址</label>
                        <input type="text" id="proxyUrl" placeholder="https://your-proxy.com/api" disabled>
                        <div class="input-hint">参考教程部署 Cloudflare Workers 或 Vercel 代理</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="saveSettings" class="save-btn">保存设置</button>
                </div>
            </div>
        </div>

        <div id="errorToast" class="toast hidden">
            <div class="toast-icon error">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
            </div>
            <span id="errorMessage">错误信息</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
